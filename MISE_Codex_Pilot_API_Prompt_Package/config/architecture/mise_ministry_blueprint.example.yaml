ministry:
  code: MISE
  name: Ministry of Infrastructure and Sustainable Energy
  reporting_timezone: Pacific/Tarawa

roles:
  - code: MINISTER
    title: Minister MISE
  - code: SECRETARY
    title: Secretary
  - code: DG_ENGINEERING
    title: Director General Engineering Services

standard_folders:
  - "01 - Intake"
  - "02 - Active Projects"
  - "03 - Project Files"
  - "04 - Reports"
  - "05 - Archive"

departments:
  - code: CORP
    name: Corporate Services
    director_role: Secretary
  - code: ABED
    name: Architectural Building & Engineering Department
    director_role: Director ABED
    divisions:
      - code: ADD
        name: Architectural Design Division
        head_role: Principal Architect
      - code: CPD
        name: Cost Planning Division
        head_role: Principal Cost Engineer
      - code: QCID
        name: Quality Control & Inspection Division
        head_role: Principal Quality Control Engineer
      - code: BMD
        name: Building Maintenance Division
        head_role: Principal Building Engineer
  - code: CED
    name: Civil Engineering Department
    director_role: Director CED
  - code: EPD
    name: Energy Planning Department
    director_role: Director EPD
  - code: WSED
    name: Water Sanitation Engineering Department
    director_role: Director WSED

folder_rules:
  project_folder_pattern: "{registry_file_ref} - {project_name}"
  sanitize_invalid_path_characters: true
  no_overwrite: true

reporting_outputs:
  - ministry_portfolio_summary
  - secretary_summary
  - director_general_summary
  - department_summary
  - division_summary
  - development_partner_summary
  - data_quality_summary

smartsheet_writeback_rules:
  protected_columns:
    - "SECRETARY APPROVAL"
    - "CONTACT EMAIL"
  allowed_columns:
    - "MISE Project Folder Link"
    - "Integration Last Sync"
    - "Reconciliation Status"
    - "Data Quality Status"
