repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["check", "."]
  - repo: local
    hooks:
      - id: compileall
        name: compile app and tests
        entry: python -m compileall app tests scripts
        language: system
        pass_filenames: false
